<!DOCTYPE html>
<html lang="en">
<head>
    <link rel ="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="theme-wrapper">
    <span class="theme-label">Change Theme</span>
    <button id="theme-toggle" class="theme-btn">
        <i class="bi bi-sun-fill sun-icon"></i>
        <i class="bi bi-moon-fill moon-icon"></i>
    </button>
</div>
  <div class="glass-panel">
    <div class="logo"><i class="bi bi-cloud"></i></div>
    <h1>Welcome to your personal cloud</h1>
    
    <form>
      <input type="email" placeholder="Email" required>
      <div class="password-wrapper">
        <input type="password" placeholder="Password" required>
      </div>
      
      <button type="submit" class="btn-primary">Sign in</button>
      <button type="button" class="btn-google">
        <img src="google-icon.png" alt=""> Sign in with Google
      </button>
    </form>
    
    <p class="footer-text">Don’t have an account? <a href="#">Sign up, it’s free!</a></p>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
